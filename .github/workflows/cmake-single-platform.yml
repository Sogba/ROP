name: Release

on:
  push:
    branches: ["release"]
  pull_request:
    branches: ["release"]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          cmake -B ${{ github.workspace }}/software/build `
                -S ${{ github.workspace }}/software `
                -G Ninja `
                -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: ninja -C ${{ github.workspace }}/software/build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: software/build

  release:
    needs: build
    runs-on: windows-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: build

      - name: Verify ROP.exe exists
        shell: pwsh
        run: |
          $exe = Get-ChildItem build -Recurse -Filter ROP.exe -ErrorAction SilentlyContinue
          if (-not $exe) {
            Write-Error "ROP.exe not found anywhere in build directory"
            exit 1
          }
          Write-Host "Found ROP.exe at $($exe.FullName)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_id }}
          name: Release ${{ github.run_id }}
          files: build/**/ROP.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
